name: todo_app
description: "An app for managing your tasks and to-dos efficiently."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  font_awesome_flutter: ^11.0.0
  flutter_bloc: ^9.1.1
  flutter_local_notifications: ^22.0.1
  timezone: ^0.11.1
  flutter_animate: ^4.5.2
  animations: ^2.2.0
  get_it: ^9.2.1
  flutter_timezone: ^5.1.0
  equatable: ^2.0.8
  go_router: ^17.3.0
  supabase: ^2.13.1
  supabase_flutter: ^2.15.1
  shared_preferences: ^2.5.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4
  bloc_test: ^10.0.0
  mocktail: ^1.0.5

flutter_launcher_icons:
  android: true
  ios: true
  adaptive_icon_background: "#FFFFFF"
  image_path: "assets/icons/app_icon.png"

flutter:
  uses-material-design: true

  assets:
    - assets/icons/

  fonts:
    - family: IranYekan
      fonts:
        - asset: assets/fonts/fr/IRANYekanBold.ttf
          weight: 700
